<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=IBM+Plex+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap');
    </style>
    <link rel="stylesheet" href="./index.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Agile Board Task Management</title>
</head>

<body>
    <nav class="side-bar" id="side-bar-div">
        <div id="side-logo-div">
            <h1 id="banner">To Do List</h1>
        </div>

        <div class="boards-nav-links-div" id="boards-nav-links-div">
            <h4 id="headline-sidepanel">ALL BOARDS</h4>
        </div>

        <div class="side-bar-bottom">
            <div class="toggle-div">

                <input type="checkbox" id="switch" />
                <label for="switch" id="label-checkbox-theme"></label>
                <svg  id="icon-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.1.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2025 Fonticons, Inc.--><path d="M232.6 56.1C225.9 51.7 217.5 50.9 210.1 53.9C202.7 56.9 197.4 63.5 195.9 71.3L175 174.6L71.7 195.4C63.9 197 57.3 202.4 54.3 209.7C51.3 217 52.1 225.5 56.5 232.2L114.7 320L56.5 407.8C52.1 414.5 51.3 422.9 54.3 430.3C57.3 437.7 63.9 443.1 71.7 444.6L175 465.4L195.9 568.7C197.5 576.5 202.9 583.1 210.2 586.1C217.5 589.1 226 588.3 232.7 583.9L320.5 525.7L408.3 583.9C415 588.3 423.4 589.1 430.8 586.1C438.2 583.1 443.6 576.5 445.1 568.7L466 465.5L569.2 444.6C577 443 583.6 437.6 586.6 430.3C589.6 423 588.8 414.5 584.4 407.8L526.2 320L584.4 232.2C588.8 225.5 589.6 217.1 586.6 209.7C583.6 202.3 577 196.9 569.2 195.4L465.8 174.6L445 71.3C443.4 63.5 438 57 430.6 53.9C423.2 50.8 414.8 51.7 408.1 56.1L320.4 114.3L232.6 56.1zM218.9 199.7L235.9 115.8L307.2 163.1C315.2 168.4 325.7 168.4 333.7 163.1L405 115.8L422 199.7C423.9 209.2 431.3 216.5 440.8 218.5L524.7 235.5L477.4 306.8C472.1 314.8 472.1 325.3 477.4 333.3L524.7 404.6L440.8 421.6C431.3 423.5 423.9 430.9 422 440.4L405 524.3L333.7 477C325.7 471.7 315.2 471.7 307.2 477L235.9 524.3L218.9 440.4C217 430.9 209.6 423.5 200.1 421.6L116.2 404.6L163.5 333.3C168.8 325.3 168.8 314.8 163.5 306.8L116.2 235.5L200.1 218.5C209.6 216.6 216.9 209.2 218.9 199.7zM271.6 320C271.6 293.3 293.3 271.6 320 271.6C346.7 271.6 368.4 293.3 368.4 320C368.4 346.7 346.7 368.4 320 368.4C293.3 368.4 271.6 346.7 271.6 320zM416.4 320C416.4 266.8 373.2 223.6 320 223.6C266.8 223.6 223.6 266.8 223.6 320C223.6 373.2 266.8 416.4 320 416.4C373.2 416.4 416.4 373.2 416.4 320z"/></svg>
            </div>
            <div class="hide-side-bar-div">
                <svg style="height:20px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.1.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2025 Fonticons, Inc.--><path d="M320 112C434.9 112 528 205.1 528 320C528 434.9 434.9 528 320 528C205.1 528 112 434.9 112 320C112 205.1 205.1 112 320 112zM320 576C461.4 576 576 461.4 576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320C64 461.4 178.6 576 320 576zM231 231C221.6 240.4 221.6 255.6 231 264.9L286 319.9L231 374.9C221.6 384.3 221.6 399.5 231 408.8C240.4 418.1 255.6 418.2 264.9 408.8L319.9 353.8L374.9 408.8C384.3 418.2 399.5 418.2 408.8 408.8C418.1 399.4 418.2 384.2 408.8 374.9L353.8 319.9L408.8 264.9C418.2 255.5 418.2 240.3 408.8 231C399.4 221.7 384.2 221.6 374.9 231L319.9 286L264.9 231C255.5 221.6 240.3 221.6 231 231z"/></svg>
                <button id="hide-side-bar-btn">Hide Sidebar </button>
            </div>
        </div>

    </nav>
    <button id="show-side-bar-btn">
        ☰
    </button>

    <div id="layout">
        
        <header id="header" class="sticky-header">
            <div class="header-name-div">
                <h2 class="header-board-name" id="header-board-name"></h2>
                <button class="dropdownBtn" id="dropdownBtn">
                    <img src="./assets/icon-chevron-down.svg" alt="icon-chevron-down" class="icon-chevron-down" id="dropDownIcon">
                </button>
            </div>
            <button id="add-new-task-btn" class="primary-btn">+ Add Task</button>
            
            <button class="edit-btn" id="edit-board-btn">
                <p id="three-dots-icon">&#8942;</p>
            </button>
            <div id="editBoardDiv" class="editBtnsDiv">
                <button class="editBtns" id="deleteBoardBtn">Delete Board</button>
            </div>
        </header>

        <div class="container">
            <main class="card-column-main">
                <!-- Task Columns: Display tasks grouped by status (TODO, DOING, DONE). -->
                <div class="column-div" data-status="todo">
                    <div id="todo-head-div" class="column-head-div">
                        <span class="dot" id="todo-dot"></span>
                        <h4 id="toDoText" class="columnHeader">TODO</h4>
                    </div>
                    <!-- Tasks container for TODO -->
                    <div class="tasks-container"></div>
                </div>
                <!-- DOING Column -->
                <div class="column-div" data-status="doing">
                    <div id="doing-head-div" class="column-head-div">
                        <span class="dot" id="doing-dot"></span>
                        <h4 id="doingText" class="columnHeader">DOING</h4>
                    </div>
                    <!-- Tasks container for DOING -->
                    <div class="tasks-container"></div>
                </div>
                <!-- DONE Column -->
                <div class="column-div" data-status="done">
                    <div id="done-head-div" class="column-head-div">
                        <span class="dot" id="done-dot"></span>
                        <h4 id="doneText" class="columnHeader">DONE</h4>
                    </div>
                    <!-- Tasks container for DONE -->
                    <div class="tasks-container"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- New Task Modal: Form for adding a new task. -->
    <form class="modal-window" id="new-task-modal-window">
        <h4 class="modal-title">Add New Task</h4>
        <div class="input-div">
            <label class="label-modal-window" id="modal-title-input" for="title-input">Title</label>
            <input type="text" class="modal-input" id="title-input" placeholder="e.g. Take a little break">
        </div>
        <div class="input-div">
            <label class="label-modal-window" id="modal-desc-input" for="desc-input">Description</label>
            <textarea name="description" id="desc-input" placeholder="e.g. Pet your dog, have a cup of coffee, dance to your favourite song and come back to conquer this challenge. 💪🏾"></textarea>
        </div>
        <div class="input-div">
            <label class="label-modal-window" id="modal-select-status" for="select-status">Status</label>
            <select name="status" id="select-status">
                <option value="todo">todo</option>
                <option value="doing">doing</option>
                <option value="done">done</option>
            </select>
        </div>
        <div class="button-group">
            <button type="submit" class="submit-btn" id="create-task-btn">Create Task</button>
            <button type="button" class="submit-btn" id="cancel-add-task-btn">Cancel</button>
        </div>
    </form>

    <!-- Edit Task Modal: Form for editing an existing task's details. -->
    <div class="edit-task-modal-window">
        <form id="edit-task-form">
            <div class="edit-task-div" id="edit-task-header">
                <input type="text" id="edit-task-title-input" class="task-title-input" placeholder="Task Title">
            </div>
            <div class="edit-task-div">
                <textarea id="edit-task-desc-input" class="edit-task-description-input" placeholder="Task Description"></textarea>
            </div>
            <div class="edit-task-div">
                <label class="label-modal-window" for="edit-select-status">Current Status</label>
                <select name="status" id="edit-select-status">
                    <option value="todo">todo</option>
                    <option value="doing">doing</option>
                    <option value="done">done</option>
                </select>
            </div>
            <div class="edit-task-div button-group">
                <button type="button" class="editBtns" id="save-task-changes-btn">Save Changes</button>
                <button type="button" class="editBtns" id="cancel-edit-btn">Cancel</button>
                <button type="button" class="editBtns" id="delete-task-btn">Delete Task</button>
            </div>
        </form>
    </div>


    <div id="filterDiv"></div>

    <!-- JavaScript Import -->
    <script type="module" src="./index.js"></script>
</body>

</html>
